name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to production
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=0
          [ -n "$DEPLOY_HOST" ] || { echo "Missing secret: DEPLOY_HOST"; missing=1; }
          [ -n "$DEPLOY_USER" ] || { echo "Missing secret: DEPLOY_USER"; missing=1; }
          [ -n "$DEPLOY_SSH_KEY" ] || { echo "Missing secret: DEPLOY_SSH_KEY"; missing=1; }
          if [ "$missing" -ne 0 ]; then
            echo "Missing GitHub Actions repository secrets."
            echo "Add DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY under Settings > Secrets > Actions."
            echo "Prefer DEPLOY_HOST=patygoteknoloji.com"
            exit 1
          fi
          # appleboy "attempted methods [none]" → key parse edilemedi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            echo "DEPLOY_SSH_KEY format invalid: must include -----BEGIN OPENSSH PRIVATE KEY-----"
            exit 1
          fi
          if ! printf '%s' "$DEPLOY_SSH_KEY" | grep -q "END OPENSSH PRIVATE KEY"; then
            echo "DEPLOY_SSH_KEY format invalid: must include -----END OPENSSH PRIVATE KEY-----"
            exit 1
          fi
          key_lines="$(printf '%s\n' "$DEPLOY_SSH_KEY" | wc -l | tr -d ' ')"
          if [ "$key_lines" -lt 3 ]; then
            echo "DEPLOY_SSH_KEY looks truncated (lines=$key_lines). Re-paste full private key."
            exit 1
          fi
          echo "Deploy secrets present (host=$DEPLOY_HOST user=$DEPLOY_USER key_lines=$key_lines)."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          debug: true
          command_timeout: 3m
          script: |
            set -euo pipefail
            APP_DIR="/var/www/patygo"
            cd "$APP_DIR"
            echo "Deploying $(git rev-parse --short HEAD) -> origin/main"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            npm ci --omit=dev
            pm2 restart patygo --update-env
            sleep 2
            curl -fsS "http://127.0.0.1:5173/api/payment/status" >/dev/null
            echo "Deploy OK: $(git rev-parse --short HEAD)"
