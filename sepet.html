<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sepet | Patygo Teknoloji</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Ana menü">
        <a class="brand" href="index.html" aria-label="Patygo Teknoloji"><img src="assets/img/patygo-logo.png" alt="Patygo Teknoloji" /></a>
        <ul class="nav-links" id="navLinks">
          <li><a href="hizmetler.html">Kurumsal Tedarik</a></li>
          <li><a href="urunler.html">Ürünler</a></li>
          <li><a href="markalar.html">Markalar</a></li>
          <li><a href="kurumsal.html">Hakkımızda</a></li>
          <li><a href="iletisim.html">İletişim</a></li>
        </ul>
        <div class="nav-actions">
          <a href="sepet.html" class="btn btn-outline cart-link">Sepet <span data-cart-count hidden>0</span></a>
          <a href="index.html#teklif" class="btn btn-primary">Teklif Al</a>
          <button class="nav-toggle" id="navToggle" aria-label="Menü" aria-expanded="false" aria-controls="navLinks"><span></span><span></span><span></span></button>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb reveal"><a href="index.html">Ana Sayfa</a> <span>/</span> <span>Sepet</span></div>
        <h1 class="reveal">Sepetiniz</h1>
        <p class="reveal d1">Fiyatlar KDV hariç listelenir. Ödeme adımında %20 KDV eklenir.</p>
      </div>
    </section>

    <section class="section" style="padding-top:0">
      <div class="container cart-layout">
        <div class="checkout-card reveal" id="cartLines"></div>
        <aside class="checkout-card reveal d1" id="cartSummary">
          <h2 style="font-size:1.15rem;margin-bottom:14px">Özet</h2>
          <div class="checkout-sum"><span>Ara toplam (KDV hariç)</span><span id="cartSub">₺0</span></div>
          <div class="checkout-sum"><span>KDV (%20)</span><span id="cartVat">₺0</span></div>
          <div class="checkout-sum total"><span>Genel toplam</span><strong id="cartTotal">₺0</strong></div>
          <a href="odeme.html" class="btn btn-primary btn-block btn-lg" id="cartCheckout" style="margin-top:16px">Ödemeye Geç</a>
          <a href="urunler.html" class="btn btn-outline btn-block" style="margin-top:10px">Alışverişe devam</a>
          <p class="form-note" id="cartNote" style="display:block;margin-top:12px"></p>
        </aside>
      </div>
    </section>
  </main>

  <script src="assets/js/cart.js"></script>
  <script src="assets/js/catalog.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/sepet.js"></script>
</body>
</html>
